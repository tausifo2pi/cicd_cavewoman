events {
  worker_connections 1024;
}

http {
  # Redirect HTTP to HTTPS for the subdomain
  server {
    listen 80;
    server_name cavewoman.coelor.com;
    return 301 https://$host$request_uri;
  }

  # Serve HTTPS content for the subdomain
  server {
    listen 443 ssl;
    server_name cavewoman.coelor.com;

    ssl_certificate /etc/letsencrypt/live/cavewoman.coelor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cavewoman.coelor.com/privkey.pem;

    # Location block to proxy requests to the backend server
    location / {
      proxy_pass http://cavewoman:5000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}